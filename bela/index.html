<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bela Scores</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        />
        <link rel="icon" href="/thumbnail.webp" type="image/jpeg" />
        <style>
            body {
                margin: 0;
                font-family: "Roboto", sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                background-color: #121212;
                color: #f4f4f9;
                padding: 20px;
            }
            h1 {
                font-size: 2.2rem;
                margin: 0 0 8px;
                color: #0078d7;
            }
            p {
                font-size: 1.2rem;
                margin: 8px 0 4px;
                color: #b0bec5;
            }
            .btn {
                display: inline-block;
                padding: 10px 20px;
                margin: 10px 5px;
                border: 2px solid #0078d7;
                color: #0078d7;
                border-radius: 5px;
                font-weight: bold;
                text-transform: uppercase;
                text-decoration: none;
                transition: 0.3s ease-in-out;
                white-space: nowrap;
            }
            .btn:hover {
                background-color: #0078d7;
                color: #fff;
            }
            footer {
                margin-top: 28px;
                font-size: 0.9rem;
                color: #607d8b;
            }
            @media (max-width: 768px) {
                .btn {
                    width: 100%;
                    max-width: 300px;
                    display: block;
                    margin: 10px auto;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Bela Scores</h1>
            <p>The fastest, smartest way to keep score for Bela (Belote).</p>
            <p>Card scanner · player stats · iCloud sync.</p>
        </header>

        <main>
            <a
                class="btn"
                href="https://apps.apple.com/us/app/bela-scores/id1476583341"
                target="_blank"
                ><i class="fab fa-apple"></i> App Store</a
            >
            <a class="btn" href="/bela/support"><i class="fas fa-life-ring"></i> Support</a>
            <a class="btn" href="/bela/privacy"><i class="fas fa-shield-halved"></i> Privacy</a>
        </main>

        <footer>
            <p>&copy; <span id="y"></span> Chewbacca Dev. All rights reserved.</p>
            <script>
                document.getElementById("y").textContent = new Date().getFullYear();
            </script>
        </footer>
    </body>
</html>
